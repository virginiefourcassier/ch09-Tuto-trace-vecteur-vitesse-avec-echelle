<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vecteur vitesse — animation</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <svg class="header-icon" viewBox="0 0 28 28" fill="none">
      <circle cx="7" cy="14" r="3" fill="#c9b0d8"></circle>
      <circle cx="21" cy="14" r="3" fill="#c9b0d8"></circle>
      <line x1="10" y1="14" x2="18" y2="14" stroke="#c9b0d8" stroke-width="2"></line>
      <polygon points="18,10 26,14 18,18" fill="#c9b0d8"></polygon>
    </svg>
    <span class="header-title">Représentation d’un vecteur vitesse</span>
  </div>

  <div class="step-badge" id="stepBadge">Introduction</div>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressFill"></div>
</div>

<main class="slides-container" id="slidesContainer">

<!-- ================= ÉTAPE 4 ================= -->
<section class="slide" id="slide4" role="group" aria-label="Diapositive 5 sur 9">
  <div class="slide-inner">

    <div class="step-label">Étape 4</div>

    <h2>Mesurer la distance <span class="vec">M<sub>2</sub>M<sub>3</sub></span></h2>

    <p class="step-intro">
      On repère M<sub>2</sub> et M<sub>3</sub>, puis on mesure sur le graphe la distance entre ces deux points.
    </p>

    <div class="svg-wrap">
      <svg id="svgStep4" viewBox="0 0 700 200" width="100%" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker id="arrowDispl" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill="#b04040"></path>
          </marker>
        </defs>
        <g id="gridStep4"></g>
        <g id="rulerStep4"></g>
        <g id="pointsStep4"></g>
        <g id="displArrow"></g>
      </svg>
    </div>

    <!-- ✅ ENCADRÉ PÉDAGOGIQUE AMÉLIORÉ -->
    <div class="measure-box" id="measureDispl">

      <div class="measure-line">
        <span class="measure-label">1️⃣ Mesure sur le graphe :</span>
        <span class="measure-value">
          M<sub>2</sub>M<sub>3</sub> = <strong>0,96 cm</strong>
        </span>
      </div>

      <div class="measure-line">
        <span class="measure-label">2️⃣ Échelle distances :</span>
        <span class="measure-value">
          1 cm → 0,5 m
        </span>
      </div>

      <div class="measure-line">
        <span class="measure-label">3️⃣ Conversion :</span>
        <span class="measure-value">
          distance réelle = <strong>0,48 m</strong>
        </span>
      </div>

    </div>

  </div>
</section>

</main>

<nav class="nav-bar">
  <button class="nav-btn" id="btnPrev" disabled>← Précédent</button>
  <div class="nav-dots" id="navDots"></div>
  <button class="nav-btn nav-btn-primary" id="btnNext">Suivant →</button>
</nav>

<script src="script.js"></script>

</body>
</html>
